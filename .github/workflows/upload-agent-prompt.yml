name: Upload Agent Prompt to Dev S3

on:
  push:
    branches:
      - main
    paths:
      - "agents/**/*.txt"
      - ".github/workflows/upload-agent-prompt.yml"

  workflow_dispatch:

concurrency:
  group: agent-prompt-${{ github.ref }}
  cancel-in-progress: true

env:
  AWS_REGION: us-gov-west-1
  S3_BUCKET: gki-kaleidoscope-agents-dev

permissions:
  id-token: write
  contents: read

jobs:
  upload-agents:
    name: Upload agent files to S3
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: arn:aws-us-gov:iam::718787032875:role/github-actions-s3-gki-kaleidoscope

      - name: Verify AWS identity
        run: aws sts get-caller-identity

      - name: Upload agent files to S3
        run: |
          set -euo pipefail

          aws s3 sync \
            agents/ \
            "s3://${S3_BUCKET}/" \
            --exclude "*" \
            --include "*.txt" \
            --delete

      - name: Show uploaded files
        run: aws s3 ls "s3://${S3_BUCKET}/" --recursive
