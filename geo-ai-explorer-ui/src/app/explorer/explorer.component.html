<div class="explorer-root"
     [ngClass]="{
       'layout-full-chat': workflowStep === WorkflowStep.FullScreenChat,
       'layout-ai-results': workflowStep === WorkflowStep.AiChatAndResults,
       'layout-map-results': workflowStep === WorkflowStep.MapAndResults,
       'layout-disambiguate': workflowStep === WorkflowStep.DisambiguateObject,
       'layout-min-chat': workflowStep === WorkflowStep.MinimizeChat,
       'layout-inspect': workflowStep === WorkflowStep.InspectObject || workflowStep === WorkflowStep.ViewNeighbors
     }"
     [style.--results-panel-height.px]="resultsPanelHeightPx">

  <p-toast position="top-center" key="explorer" />

  <p-dialog
    header="Save Query"
    [(visible)]="saveQueryDialogVisible"
    [modal]="true"
    [draggable]="false"
    [resizable]="false"
    appendTo="body"
    styleClass="save-query-dialog">
    <div class="save-query-form">
      <label for="save-query-name">Name</label>
      <input
        id="save-query-name"
        type="text"
        [(ngModel)]="saveQueryName"
        (keydown.enter)="saveCurrentQuery()"
        autocomplete="off" />
    </div>

    <ng-template pTemplate="footer">
      <p-button
        severity="secondary"
        label="Cancel"
        (onClick)="saveQueryDialogVisible = false">
      </p-button>

      <p-button
        label="Save"
        [disabled]="!saveQueryName.trim()"
        (onClick)="saveCurrentQuery()">
      </p-button>
    </ng-template>
  </p-dialog>

  <p-dialog
    header="Saved Query"
    [(visible)]="savedQueryDialogVisible"
    [modal]="true"
    [draggable]="false"
    [resizable]="false"
    appendTo="body"
    styleClass="save-query-dialog">
    <div class="save-query-form saved-query-details">
      <div class="saved-query-meta" *ngIf="savedQueryDetails">
        <span>Saved</span>
        <strong>{{ formatSavedQueryDate(savedQueryDetails) }}</strong>
      </div>

      <label for="saved-query-name">Name</label>
      <input
        id="saved-query-name"
        type="text"
        [(ngModel)]="savedQueryName"
        (keydown.enter)="renameCurrentSavedQuery()"
        autocomplete="off" />
    </div>

    <ng-template pTemplate="footer">
      <p-button
        severity="danger"
        label="Unsave"
        (onClick)="unsaveCurrentQuery()">
      </p-button>

      <p-button
        severity="secondary"
        label="Close"
        (onClick)="savedQueryDialogVisible = false">
      </p-button>

      <p-button
        label="Rename"
        [disabled]="!savedQueryName.trim() || savedQueryName.trim() === savedQueryDetails?.title"
        (onClick)="renameCurrentSavedQuery()">
      </p-button>
    </ng-template>
  </p-dialog>

  <div *ngIf="loading" class="spinner-overlay">
    <p-progress-spinner ariaLabel="loading" />
  </div>

  <!-- Chat -->
  <section class="chat-panel"
           *ngIf="
             workflowStep === WorkflowStep.FullScreenChat ||
             workflowStep === WorkflowStep.AiChatAndResults ||
             workflowStep === WorkflowStep.MinimizeChat
           ">

    <aichat [class.small-ai-chat]="workflowStep === WorkflowStep.MinimizeChat"></aichat>
  </section>

  <section class="inspector" *ngIf="selectedObject && workflowStep !== WorkflowStep.FullScreenChat">
      <p-button
        *ngIf="workflowStep !== WorkflowStep.DisambiguateObject"
        class="inspector-back-button"
        severity="secondary"
        pTooltip="Go Back"
        (onClick)="onMapBack()"
      >
        <fa-icon [icon]="backIcon"></fa-icon>
        <label>Back</label>
      </p-button>

      <div
        class="horizontal-layout inspector-controls"
        [class.has-floating-back]="workflowStep !== WorkflowStep.DisambiguateObject">
          <ng-container *ngIf="(previousWorkflowStep$ | async) !== WorkflowStep.DisambiguateObject">
            <div></div>
            <h2 class="inspector-title">
              {{ selectedObject.properties.label }}
            </h2>
            <div
              class="inspector-pane-picker"
              *ngIf="isInspectorWorkflowStep()"
              cdkDrag
              cdkDragBoundary=".inspector">
              <span class="inspector-pane-picker-handle" cdkDragHandle aria-hidden="true"></span>

              <label>
                <span>Left</span>
                <select
                  [ngModel]="inspectorPanes[0]"
                  (ngModelChange)="setInspectorPane(0, $event)">
                  <option
                    *ngFor="let option of inspectorPaneOptions"
                    [ngValue]="option.value"
                    [disabled]="isInspectorPaneOptionDisabled(0, option.value)">
                    {{ option.label }}
                  </option>
                </select>
              </label>

              <label>
                <span>Right</span>
                <select
                  [ngModel]="inspectorPanes[1]"
                  (ngModelChange)="setInspectorPane(1, $event)">
                  <option
                    *ngFor="let option of inspectorPaneOptions"
                    [ngValue]="option.value"
                    [disabled]="isInspectorPaneOptionDisabled(1, option.value)">
                    {{ option.label }}
                  </option>
                </select>
              </label>
            </div>
          </ng-container>

          <ng-container *ngIf="(previousWorkflowStep$ | async) === WorkflowStep.DisambiguateObject">
            <h2>Select An Object</h2>

            <p-button severity="secondary"
                      pTooltip="Use the selected object to resolve the ambiguity"
                      (onClick)="disambiguate()"
                      [disabled]="selectedObject == null">
              <label>Select</label>
              <fa-icon [icon]="forwardIcon"></fa-icon>
            </p-button>
          </ng-container>
      </div>

      <!-- Old minimize code. Hanging around just in-case we want it back -->
      <!--
      <div class="min-max">
        <p-button *ngIf="!chatMinimized"
                  severity="secondary"
                  pTooltip="Minimize"
                  (onClick)="minimizeChat()">
          <fa-icon [icon]="minimizeIcon"></fa-icon>
        </p-button>

        <p-button *ngIf="chatMinimized"
                  severity="secondary"
                  pTooltip="Maximize"
                  (onClick)="minimizeChat()">
          <fa-icon [icon]="upsizeIcon"></fa-icon>
        </p-button>
      </div>
      -->

    <div
      class="inspector-workspace"
      *ngIf="isInspectorWorkflowStep()"
      [style.--inspector-left-width.%]="inspectorSplitPercent">
      <section
        class="object-pane object-pane-left"
        [class.object-pane-map]="inspectorPanes[0] === 'map'">
        <ng-container
          [ngTemplateOutlet]="inspectorPaneTemplate"
          [ngTemplateOutletContext]="{ pane: inspectorPanes[0], side: 'left' }">
        </ng-container>
      </section>

      <div
        class="inspector-resizer"
        role="separator"
        aria-orientation="vertical"
        tabindex="0"
        (pointerdown)="startInspectorResize($event)"
        (pointermove)="onInspectorResize($event)"
        (pointerup)="endInspectorResize($event)"
        (pointercancel)="endInspectorResize($event)">
      </div>

      <section
        class="object-pane object-pane-right"
        [class.object-pane-map]="inspectorPanes[1] === 'map'">
        <ng-container
          [ngTemplateOutlet]="inspectorPaneTemplate"
          [ngTemplateOutletContext]="{ pane: inspectorPanes[1], side: 'right' }">
        </ng-container>
      </section>
    </div>

    <ng-template #inspectorPaneTemplate let-pane="pane" let-side="side">
      <div class="object-pane-shell" [ngSwitch]="pane">
        <div class="object-pane-header" *ngIf="pane !== 'map' && side !== 'left'">
          <h3>{{ inspectorPaneLabel(pane) }}</h3>
        </div>

        <div class="object-pane-body" *ngSwitchCase="'map'">
          <div #mapElement id="map"></div>
          <ng-container *ngTemplateOutlet="legendPanelTemplate"></ng-container>
        </div>

        <div class="object-pane-body" *ngSwitchCase="'attributes'">
          <attribute-panel *ngIf="selectedObject"></attribute-panel>
        </div>

        <div class="object-pane-body" *ngSwitchCase="'graph'">
          <graph-explorer
            #graphExplorer
            [explorer]="this">
          </graph-explorer>
        </div>
      </div>
    </ng-template>

    <div id="graphExplorerContainer" *ngIf="!isInspectorWorkflowStep()">
      <ng-container *ngIf="(previousWorkflowStep$ | async) === WorkflowStep.DisambiguateObject">
        <h2 class="inspector-title">
          {{ selectedObject.properties.label }}
        </h2>
      </ng-container>

      <p-tabs [(value)]="activeTab">
        <p-tablist>
          <p-tab value="0">Attributes</p-tab>
          <p-tab value="1">Relationships</p-tab>
        </p-tablist>

        <p-tabpanels>
          <p-tabpanel value="0">
            <attribute-panel *ngIf="selectedObject"></attribute-panel>
          </p-tabpanel>

          <p-tabpanel value="1">
            <graph-explorer *ngIf="activeTab === '1'"
                            #graphExplorer
                            [explorer]="this">
            </graph-explorer>
          </p-tabpanel>
        </p-tabpanels>
      </p-tabs>
    </div>
  </section>

  <!-- Map -->
  <section class="map-panel"
           *ngIf="
             workflowStep === WorkflowStep.MapAndResults ||
             workflowStep === WorkflowStep.DisambiguateObject ||
             workflowStep === WorkflowStep.MinimizeChat
           ">

    <div #mapElement id="map"></div>

    <p-button
      *ngIf="selectedObject == null"
      class="map-back-button"
      severity="secondary"
      pTooltip="Go Back"
      (onClick)="onMapBack()"
    >
      <fa-icon [icon]="backIcon"></fa-icon>
      <label>Back</label>
    </p-button>

    <p-button
      *ngIf="selectedObject == null && canSaveCurrentQueryValue && !currentSavedQueryIndexValue"
      class="map-save-query-button"
      severity="secondary"
      pTooltip="Save query"
      (onClick)="openSaveQueryDialog()"
    >
      <fa-icon [icon]="saveQueryIcon"></fa-icon>
      <label>Save Query</label>
    </p-button>

    <p-button
      *ngIf="selectedObject == null && canSaveCurrentQueryValue && currentSavedQueryIndexValue"
      class="map-save-query-button"
      severity="success"
      pTooltip="Saved query details"
      (onClick)="openSavedQueryDialog()"
    >
      <fa-icon [icon]="saveQueryIcon"></fa-icon>
      <label>{{ currentSavedQueryValue?.title ?? 'Saved Query' }}</label>
    </p-button>

    <ng-container *ngTemplateOutlet="legendPanelTemplate"></ng-container>
  </section>

  <!-- Results / Disambiguation Body -->
  <section class="results-panel"
           *ngIf="
             workflowStep === WorkflowStep.AiChatAndResults ||
             workflowStep === WorkflowStep.MapAndResults ||
             workflowStep === WorkflowStep.DisambiguateObject ||
             workflowStep === WorkflowStep.MinimizeChat
           ">
    <!-- Disambiguation Header -->
    <div id="disambiguate-header"
        class="horizontal-layout"
        *ngIf="workflowStep === WorkflowStep.DisambiguateObject">

      <div></div>

      <h2>Select An Object</h2>

      <p-button severity="secondary"
                pTooltip="Use the selected object to resolve the ambiguity"
                (onClick)="disambiguate()"
                [disabled]="selectedObject == null">
        <label>Select</label>
        <fa-icon [icon]="forwardIcon"></fa-icon>
      </p-button>
    </div>

    <ng-container>
      <results-table
        #resultsTable
        (resultsHeightChange)="onResultsHeightChange($event)"
        (resultsCollapsedChange)="onResultsCollapsedChange($event)"
        [collapsed]="resultsCollapsed"
      ></results-table>
    </ng-container>
  </section>

  <!-- Legend -->
  <ng-template #legendPanelTemplate>
    <p-panel *ngIf="
               workflowStep === WorkflowStep.MapAndResults ||
               workflowStep === WorkflowStep.MinimizeChat ||
               (workflowStep === WorkflowStep.InspectObject && isInspectorPaneActive('map')) ||
               (workflowStep === WorkflowStep.ViewNeighbors && isInspectorPaneActive('map'))
             "
           [toggleable]="true"
           header="Layers"
           [(collapsed)]="legendCollapsed"
           (click)="onLegendPanelClick($event)"
           class="legend">

    <ng-container *ngIf="orderedTypes.length > 0">
      <div cdkDropList (cdkDropListDropped)="drop($event)">
        <div class="legend-item horizontal-layout"
             *ngFor="let type of orderedTypes"
             cdkDrag>

          <ng-container *ngIf="typeLegend[type] as legend">
            <span
              class="legend-drag-handle"
              cdkDragHandle
              aria-hidden="true"
              (click)="$event.stopPropagation()">
            </span>

            <p-checkbox binary="true"
                        [ngModel]="legend.visible"
                        [inputId]="legend.label"
                        (onChange)="toggleTypeLegend(type, legend)" />

            <div class="square"
                 [ngStyle]="{ background: legend.color }">
            </div>

            <button type="button"
                    class="legend-layer-name"
                    (pointerdown)="$event.stopPropagation()"
                    (mousedown)="$event.stopPropagation()"
                    (touchstart)="$event.stopPropagation()"
                    (click)="openResultsForType(type, $event)">
              {{ legend.label }}
            </button>
          </ng-container>
        </div>
      </div>
    </ng-container>

    <hr class="legend-divider">

    <h4>Context Layers</h4>

    <div>
      <div class="legend-item horizontal-layout"
           *ngFor="let layer of vectorLayers$ | async">

        <p-checkbox binary="true"
                    [ngModel]="layer.enabled"
                    [inputId]="layer.id"
                    (onChange)="toggleVectorLayer(layer)" />

        <div class="square"
             [ngStyle]="{ background: layer.color }">
        </div>

        <label [for]="layer.id" class="ml-2">
          {{ layer.label }}
        </label>
      </div>
    </div>
    </p-panel>
  </ng-template>
</div>
